name: light_pollution_app
description: "SURA - Detect and visualize light pollution worldwide"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_riverpod: ^2.6.1
  image_picker: ^1.1.2
  image: ^4.5.3
  go_router: ^15.1.2
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  tflite_flutter: ^0.11.0
  http: ^1.2.1
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
